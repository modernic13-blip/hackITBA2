# =============================================================================
# Config para ETFs — Perfil Bajo Riesgo
# Activos: GLD, QQQ, TLT
# =============================================================================
# Los ETFs son más estables → menos eventos, holding más largo,
# menor aversión al riesgo, más lookback

asset: "ETF"
period:
  - "2020-01-01"
  - "2024-12-31"
frequency: "1d"

ingestion:
  source: "csv"
  csv_path: "data/GLD.csv"   # Cambiar según el activo

features:
  timeframes:
    - "1d"
    - "5d"
    - "20d"
  indicators: "all"
  indicator_params:
    rsi:
      period: [14, 21]
    macd:
      fast: [12]
      slow: [26]
      signal: [9]
    bbands:
      period: [20]
      num_std: [2.0]
    adx:
      period: [14]
    atr:
      period: [14]
    cmf:
      period: [20]
  normalize:
    methods:
      - "zscore"
    window: 60
  drop_na_threshold: 0.3

filtering:
  method: "adaptive_cusum"
  cusum_mode: "symmetric"
  k_Px: 1.0          # Menos eventos en ETFs (más estables)
  lookback: 60
  min_events: 20

labeling:
  pt_sl:
    - 1.5            # Objetivo moderado
    - 1.0
  min_ret: 0.0
  vertical_bars: 30  # 30 días (ETFs se mueven lento)
  vol_span: 60
  use_sample_weights: true

splitting:
  n_splits: 5
  test_size: 0.2
  purge_hours: 24
  embargo_pct: 0.01
  expanding: true
  min_train_size: 200

feature_selection:
  max_features: 20
  min_improvement: 0.002
  n_estimators: 100
  max_depth: 4
  use_sample_weights: true
  verbose: false

modeling:
  model: "xgboost"
  max_combinations: 40
  use_sample_weights: true
  use_selected_features: true
  verbose: false
  param_grid:
    n_estimators: [200, 400]
    max_depth: [3, 4]
    learning_rate: [0.01, 0.05]
    subsample: [0.8]
    colsample_bytree: [0.8, 1.0]

evaluation:
  risk_free_rate: 0.04
  periods_per_year: 252
  n_trials_dsr: 10
  pbo_partitions: 8
  commission_bps: 3.0      # ETFs tienen comisiones bajas
  use_selected_features: true

risk_optimization:
  risk_profile: "low"
  optimizer: "markowitz"
  lambda_risk: 7.0          # Alta aversión al riesgo para ETFs
  lookback_days: 250
  rebalance_threshold: 0.05 # Rebalanceo solo si cambio > 5%
  penalty: 0.001
  capital: 100000
