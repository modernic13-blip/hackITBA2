# =============================================================================
# Perfil: HIGH RISK — Agresivo
# =============================================================================
# Concentrado en activos de alta volatilidad: crypto, growth stocks, SPACs.
# Baja aversión al riesgo, mayor exposición a BTC/altcoins y acciones growth.
# El optimizador BL acepta swings grandes para capturar alpha elevado.
# =============================================================================

profile_name:          high_risk
risk_tolerance:        0.85         # Alta tolerancia al riesgo
max_weight_per_asset:  0.40         # Máx 40% por activo (concentración permitida)
confidence_level:      0.75         # Mayor confianza en las señales ML
initial_capital:       1000.0

# ── Parámetros Black-Litterman ─────────────────────────────────────────────
black_litterman:
  delta: 1.5        # Baja aversión al riesgo = pesos más agresivos
  tau:   0.05

# ── Activos del portafolio ─────────────────────────────────────────────────
assets:
  - BTC
  - NVDA
  - META
  - PLTR
  - COIN
  - AMZN
  - AAPL

# ── Hiperparámetros específicos por activo (custom_assets) ────────────────
custom_assets:

  BTC:
    # BTC: máxima profundidad de árbol, CUSUM muy sensible, barreras amplias
    filtering:
      k_Px:    0.35
      lookback: 100
    labeling:
      pt_sl:         [2.0, 2.0]
      vertical_bars: 48       # 2 días a 1h (posiciones más cortas)
      vol_span:      120
    modeling:
      model: xgboost
      max_combinations: 20
      param_grid:
        n_estimators:     [200, 300, 400]
        max_depth:        [7, 9, 11]
        learning_rate:    [0.01, 0.05]
        subsample:        [0.7, 0.8]
        colsample_bytree: [0.7, 0.8]
        min_child_weight: [1, 3]

  PLTR:
    # PLTR: alta volatilidad, XGBoost profundo
    filtering:
      k_Px:    0.45
      lookback: 130
    labeling:
      pt_sl:         [2.0, 1.5]
      vertical_bars: 48
    modeling:
      model: xgboost
      max_combinations: 15
      param_grid:
        n_estimators:  [200, 300]
        max_depth:     [5, 7, 9]
        learning_rate: [0.01, 0.05]
        subsample:     [0.7, 0.8]

  NVDA:
    # NVDA: alta beta, LightGBM con muchas hojas
    filtering:
      k_Px: 0.45
    labeling:
      pt_sl:         [2.0, 1.5]
      vertical_bars: 48
    modeling:
      model: lightgbm
      max_combinations: 15
      param_grid:
        n_estimators:  [200, 300]
        max_depth:     [7, 9]
        num_leaves:    [127, 255]
        learning_rate: [0.01, 0.05]

  META:
    filtering:
      k_Px: 0.50
    labeling:
      pt_sl: [1.8, 1.5]
    modeling:
      model: lightgbm
      param_grid:
        n_estimators: [150, 250]
        max_depth:    [5, 7]
        num_leaves:   [63, 127]

  COIN:
    filtering:
      k_Px:    0.40
      lookback: 120
    labeling:
      pt_sl:         [2.0, 1.8]
      vertical_bars: 48
    modeling:
      model: xgboost
      param_grid:
        n_estimators:  [200, 300]
        max_depth:     [7, 9]
        learning_rate: [0.01, 0.05]

  AMZN:
    modeling:
      model: xgboost
      param_grid:
        n_estimators:  [100, 200]
        max_depth:     [5, 7]
        learning_rate: [0.05, 0.1]

  AAPL:
    modeling:
      model: lightgbm
      param_grid:
        n_estimators: [100, 200]
        max_depth:    [5, 7]

# ── Overrides globales del pipeline para este perfil ──────────────────────
pipeline:
  labeling:
    pt_sl:         [2.0, 1.5]   # Barreras más amplias para capturar movimientos grandes
    vertical_bars: 48            # Horizonte corto: 2 días a 1h
    vol_span:      120
  filtering:
    k_Px:     0.45              # CUSUM más sensible → más señales
    lookback: 140
  feature_selection:
    max_features:    30
    min_improvement: 0.001      # Más permisivo: capturar más señales
  evaluation:
    risk_free_rate:   0.045
    commission_bps:   8.0       # Mayor comisión por mayor rotación
    periods_per_year: 8760      # Activos mixtos pero BTC es 24/7
