# =============================================================================
# Perfil: HIGH RISK — Agresivo  (datos HORARIOS)
# =============================================================================
# Concentrado en activos de alta volatilidad: crypto, growth stocks.
# Parámetros ajustados para barras de 1 hora.
# =============================================================================

profile_name:          high_risk
risk_tolerance:        0.85
max_weight_per_asset:  0.40
confidence_level:      0.75
initial_capital:       1000.0

black_litterman:
  delta: 1.5
  tau:   0.05

assets:
  - BTC
  - NVDA
  - META
  - PLTR
  - COIN
  - AMZN
  - AAPL

custom_assets:

  BTC:
    filtering:
      k_Px:    0.35
      lookback: 200       # ~8 días a 1h
    labeling:
      pt_sl:         [2.0, 2.0]
      vertical_bars: 48   # 2 días a 1h
      vol_span:      240
    modeling:
      model: xgboost
      max_combinations: 4
      param_grid:
        n_estimators:  [100, 200]
        max_depth:     [5, 7]
        learning_rate: [0.05, 0.1]

  PLTR:
    filtering:
      k_Px:    0.45
      lookback: 240
    labeling:
      pt_sl:         [2.0, 1.5]
      vertical_bars: 48
    modeling:
      model: xgboost
      max_combinations: 4
      param_grid:
        n_estimators:  [100, 200]
        max_depth:     [5, 7]
        learning_rate: [0.05, 0.1]

  NVDA:
    filtering:
      k_Px: 0.45
    labeling:
      pt_sl:         [2.0, 1.5]
      vertical_bars: 48
    modeling:
      model: lightgbm
      max_combinations: 4
      param_grid:
        n_estimators:  [100, 200]
        max_depth:     [5, 7]
        num_leaves:    [63, 127]
        learning_rate: [0.05, 0.1]

  META:
    filtering:
      k_Px: 0.50
    labeling:
      pt_sl: [1.8, 1.5]
    modeling:
      model: lightgbm
      param_grid:
        n_estimators: [100, 200]
        max_depth:    [5, 7]
        num_leaves:   [63, 127]

  COIN:
    filtering:
      k_Px:    0.40
      lookback: 200
    labeling:
      pt_sl:         [2.0, 1.8]
      vertical_bars: 48
    modeling:
      model: xgboost
      param_grid:
        n_estimators:  [100, 200]
        max_depth:     [5, 7]
        learning_rate: [0.05, 0.1]

  AMZN:
    modeling:
      model: xgboost
      param_grid:
        n_estimators:  [100, 200]
        max_depth:     [5, 7]
        learning_rate: [0.05, 0.1]

  AAPL:
    modeling:
      model: lightgbm
      param_grid:
        n_estimators: [100, 200]
        max_depth:    [5, 7]

pipeline:
  labeling:
    pt_sl:         [2.0, 1.5]
    vertical_bars: 48           # 2 días a 1h
    vol_span:      240
  filtering:
    k_Px:     0.45
    lookback: 200               # ~8 días a 1h
  evaluation:
    risk_free_rate:   0.045
    periods_per_year: 8760
    commission_bps:   8.0
