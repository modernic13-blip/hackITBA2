profile_name:          low_risk
risk_tolerance:        0.3
max_weight_per_asset:  0.25
confidence_level:      0.65
initial_capital:       1000.0

black_litterman:
  delta: 3.5
  tau:   0.05

assets:
  - AAPL
  - NVDA
  - AMZN
  - XOM
  - GLD
  - QQQ
  - TLT

custom_assets:

  AAPL:
    modeling:
      model: lightgbm
      max_combinations: 4
      param_grid:
        n_estimators:  [100, 200]
        max_depth:     [3, 5]
        learning_rate: [0.05, 0.1]
        num_leaves:    [31, 63]

  GLD:
    filtering:
      k_Px:    0.9
      lookback: 480
    labeling:
      pt_sl:         [1.0, 1.0]
      vertical_bars: 96
    modeling:
      model: random_forest
      param_grid:
        n_estimators: [100, 200]
        max_depth:    [3, 5]
        # sin learning_rate: random_forest no lo soporta

  TLT:
    filtering:
      k_Px:    1.0
      lookback: 480
    labeling:
      pt_sl:         [1.0, 0.8]
      vertical_bars: 120
    modeling:
      model: random_forest
      param_grid:
        n_estimators: [100, 200]
        max_depth:    [3, 5]
        # sin learning_rate: random_forest no lo soporta

  XOM:
    modeling:
      model: xgboost
      param_grid:
        n_estimators:  [100, 200]
        max_depth:     [3, 5]
        learning_rate: [0.05, 0.1]

  QQQ:
    modeling:
      model: lightgbm
      param_grid:
        n_estimators: [100, 200]
        max_depth:    [3, 5]

pipeline:
  labeling:
    pt_sl:         [1.2, 1.0]
    vertical_bars: 96
  filtering:
    k_Px:    0.7
    lookback: 360
  evaluation:
    risk_free_rate:   0.045
    periods_per_year: 8760
    commission_bps:   3.0
