profile_name:          med_risk
risk_tolerance:        0.55
max_weight_per_asset:  0.30
confidence_level:      0.70
initial_capital:       1000.0

black_litterman:
  delta: 2.5
  tau:   0.05

assets:
  - AAPL
  - NVDA
  - META
  - AMZN
  - XOM
  - GLD
  - QQQ
  - BTC
  - COIN

custom_assets:

  BTC:
    filtering:
      k_Px:    0.45
      lookback: 240
    labeling:
      pt_sl:         [1.8, 1.2]
      vertical_bars: 48
    modeling:
      model: xgboost
      max_combinations: 4
      param_grid:
        n_estimators:  [100, 200]
        max_depth:     [5, 7]
        learning_rate: [0.05, 0.1]

  COIN:
    filtering:
      k_Px:    0.50
      lookback: 240
    labeling:
      pt_sl:         [1.5, 1.2]
      vertical_bars: 48
    modeling:
      model: xgboost
      param_grid:
        n_estimators:  [100, 200]
        max_depth:     [5, 7]
        learning_rate: [0.05, 0.1]

  NVDA:
    modeling:
      model: lightgbm
      param_grid:
        n_estimators:  [100, 200]
        max_depth:     [5, 7]
        num_leaves:    [63, 127]
        learning_rate: [0.05, 0.1]

  META:
    modeling:
      model: lightgbm
      param_grid:
        n_estimators: [100, 200]
        max_depth:    [5, 7]
        num_leaves:   [63, 127]

  AAPL:
    modeling:
      model: lightgbm
      param_grid:
        n_estimators:  [100, 200]
        max_depth:     [3, 5]
        learning_rate: [0.05, 0.1]

  GLD:
    filtering:
      k_Px: 0.75
    modeling:
      model: random_forest
      param_grid:
        n_estimators: [100, 200]
        max_depth:    [3, 5]

pipeline:
  labeling:
    pt_sl:         [1.5, 1.0]
    vertical_bars: 72
  filtering:
    k_Px:     0.55
    lookback: 240
  evaluation:
    risk_free_rate:   0.045
    periods_per_year: 8760
    commission_bps:   5.0
