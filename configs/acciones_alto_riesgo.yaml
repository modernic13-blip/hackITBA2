# =============================================================================
# Config para Acciones — Perfil Alto Riesgo
# Activos: AAPL, NVDA, META, AMZN, XOM, PLTR, COIN
# =============================================================================
# Acciones tech son más volátiles → más eventos, holding más corto,
# mayor aversión al riesgo que crypto, menos lookback

asset: "ACCION"
period:
  - "2020-01-01"
  - "2024-12-31"
frequency: "1d"

ingestion:
  source: "csv"
  csv_path: "data/AAPL.csv"   # Cambiar según el activo

features:
  timeframes:
    - "1d"
    - "5d"
    - "20d"
  indicators: "all"
  indicator_params:
    rsi:
      period: [14, 21]
    macd:
      fast: [12]
      slow: [26]
      signal: [9]
    cci:
      period: [20]
    willr:
      period: [14]
    bbands:
      period: [20]
      num_std: [2.0]
    adx:
      period: [14]
    atr:
      period: [14]
    supertrend:
      period: [10]
      multiplier: [3.0]
    cmf:
      period: [20]
    mfi:
      period: [14]
    ofi:
      period: [20]
  normalize:
    methods:
      - "zscore"
    window: 60
  drop_na_threshold: 0.3

filtering:
  method: "adaptive_cusum"
  cusum_mode: "symmetric"
  k_Px: 0.7          # Más sensible que ETFs
  lookback: 60
  min_events: 40

labeling:
  pt_sl:
    - 2.0            # Objetivo más alto para acciones volátiles
    - 1.0
  min_ret: 0.005     # Retorno mínimo de 0.5%
  vertical_bars: 15  # 15 días de holding
  vol_span: 60
  use_sample_weights: true

splitting:
  n_splits: 5
  test_size: 0.2
  purge_hours: 24
  embargo_pct: 0.01
  expanding: true
  min_train_size: 200

feature_selection:
  max_features: 25
  min_improvement: 0.002
  n_estimators: 100
  max_depth: 5
  use_sample_weights: true
  verbose: false

modeling:
  model: "xgboost"
  max_combinations: 40
  use_sample_weights: true
  use_selected_features: true
  verbose: false
  param_grid:
    n_estimators: [200, 400, 600]
    max_depth: [3, 5, 7]
    learning_rate: [0.01, 0.05]
    subsample: [0.8]
    colsample_bytree: [0.7, 0.9]

evaluation:
  risk_free_rate: 0.04
  periods_per_year: 252
  n_trials_dsr: 10
  pbo_partitions: 8
  commission_bps: 5.0
  use_selected_features: true

risk_optimization:
  risk_profile: "high"
  optimizer: "markowitz"
  lambda_risk: 4.0           # Menor aversión → más retorno esperado
  lookback_days: 150
  rebalance_threshold: 0.02  # Rebalanceo dinámico (umbral 2%)
  penalty: 0.001
  capital: 100000
